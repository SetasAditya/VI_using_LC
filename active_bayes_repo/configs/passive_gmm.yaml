seed: 7
device: cpu
output_dir: outputs_passive_v1

data:
  source: synthetic_gmm
  dataset_path: outputs_passive_v1/data/passive_gmm_dataset_v1.npz
  external_npz_path: ""
  save_npz: true
  query_scheme: passive_iid
  d_in: 2
  latent_dim: 2
  num_classes: 4
  total_train: 1600
  total_val: 640
  total_test: 640
  feature_noise: 0.03
  latent_noise: 0.0
  num_stream_steps: 12
  num_candidates: 1
  query_batch_size: 32
  teacher_scoring: none
  gmm:
    overlap_train: 0.20
    overlap_val: 0.18
    overlap_test: 0.16
    sigma_scale: 0.75
    dirichlet_alpha: 2.0
    balanced_labels: false

model:
  identity_encoder: true
  hidden_dim: 64
  num_particles: 120
  num_clusters: 4
  obs_sigma: 0.42
  teacher_sigma: 0.30
  cluster_tau: 0.60
  rejuvenation: 0.08
  teacher_move_steps: 5
  teacher_move_step_size: 0.055
  student_move_steps: 2
  student_move_step_size: 0.035
  ess_resample_frac: 0.35
  topology_bandwidth: 0.95
  mode_merge_tol: 0.80
  energy_residual_weight: 0.05
  obs_support_weight: 0.35

training:
  disable_query_training: true
  projector_epochs: 2
  query_pretrain_epochs: 0
  assimilator_epochs: 6
  projector_lr: 0.001
  assimilator_lr: 0.0008
  weight_decay: 0.00001
  grad_clip: 5.0
  cls_weight: 1.0
  center_weight: 0.05
  query_weight: 0.0
  query_coverage_weight: 0.0
  teacher_weight: 1.20
  basin_weight: 0.85
  identifiability_weight: 1.25
  drift_weight: 0.55
  nll_weight: 0.25
  contrastive_weight: 0.05
  control_weight: 0.002
  memory_weight: 0.0005
  teacher_forcing_prob: 0.0
  teacher_forcing_prob_start: 0.0
  teacher_forcing_prob_end: 0.0
  coverage_guidance_prob_start: 0.0
  coverage_guidance_prob_end: 0.0
  teacher_score_temperature: 0.35
  sinkhorn_epsilon: 0.35
  basin_sinkhorn_epsilon: 0.40
  sinkhorn_iters: 25
  print_every: 1

evaluation:
  ablation_policies: [passive_iid]

visualization:
  grid_lim_x: [-8.0, 8.0]
  grid_lim_y: [-8.0, 8.0]
  grid_n: 160
  panel_steps: [0, 1, 3, 5, 7, 9, 11]
  project_method: pca
